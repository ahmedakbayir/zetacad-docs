site_name: ZetaCAD Yardım Merkezi
site_description: ZetaCAD - Yapay Zeka Destekli Doğalgaz Proje Tasarım Yazılımı Kullanım Kılavuzu
site_author: ahmedakbayir
site_url: https://ahmedakbayir.github.io/zetacad-docs/

repo_name: ahmedakbayir/zetacad-docs
repo_url: https://github.com/ahmedakbayir/zetacad-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: tr
  logo: .assets/logo.png
  favicon: .assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Karanlık moda geç
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Aydınlık moda geç
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow

extra_css:
  - .assets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ahmedakbayir
  version:
    provider: mike
  analytics:
    feedback:
      title: Bu sayfa yardımcı oldu mu?
      ratings:
        - icon: material/emoticon-happy-outline
          name: Evet, yardımcı oldu
          data: 1
          note: Geri bildiriminiz için teşekkürler!
        - icon: material/emoticon-sad-outline
          name: Hayır, iyileştirme gerekli
          data: 0
          note: Geri bildiriminizi aldık, geliştireceğiz.

plugins:
  - search:
      lang: tr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      title: Bu Sayfada

nav:
  - Ana Sayfa: index.md
  - Baslangic:
    - baslangic/index.md
    - Genel Bakis: baslangic/genel-bakis.md
    - Kurulum: baslangic/kurulum.md
    - Ilk Proje: baslangic/ilk-proje.md
    - Arayuz Tanitimi: baslangic/arayuz.md
  - Kullanim Kilavuzu:
    - kullanim-kilavuzu/index.md
    - Akilli Nesneler: kullanim-kilavuzu/cizim-araclari.md
    - Mimari Plan: kullanim-kilavuzu/duvarlar.md
    - Tesisat Tasarimi: kullanim-kilavuzu/tesisat.md
    - Boru Capi Tasarimi: kullanim-kilavuzu/kapi-pencere.md
    - Otomatik Kontrol: kullanim-kilavuzu/odalar.md
    - 3D Kati Model: kullanim-kilavuzu/3d-gorunum.md
    - Disa Aktarma ve E-Imza: kullanim-kilavuzu/disari-aktarma.md
    - DIPOS Dijital Onay: kullanim-kilavuzu/ai-ozellikleri.md
