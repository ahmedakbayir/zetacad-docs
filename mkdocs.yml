site_name: ZetaCAD Yardım Merkezi
site_description: ZetaCAD - Yapay Zeka Destekli Doğalgaz Proje Tasarım Yazılımı Kullanım Kılavuzu
site_author: ahmedakbayir
site_url: https://ahmedakbayir.github.io/zetacad-docs/

repo_name: ahmedakbayir/zetacad-docs
repo_url: https://github.com/ahmedakbayir/zetacad-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: tr
  logo: assets/logo.png
  favicon: assets/favicon.png
  # JEST YAZI TİPLERİ İÇİN GOOGLE FONTS İPTAL EDİLDİ (CSS'ten sistem fontu verilecek)
  font: false 
  palette:
    - scheme: default
      primary: white
      accent: custom
      toggle:
        icon: material/weather-night
        name: Karanlık moda geç
    - scheme: slate
      primary: black
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Aydınlık moda geç
  features:
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow

extra_css:
  - assets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ahmedakbayir
  version:
    provider: mike

plugins:
  - search:
      lang: tr
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: Bu Sayfada

nav:
  - Başlangıç:
    - Genel Bakış: baslangic/genel-bakis.md
    - Kurulum: baslangic/kurulum.md
    - İlk Proje: baslangic/ilk-proje.md
    - Arayüz Tanıtımı: baslangic/arayuz.md
  - Kullanım Kılavuzu:
    - Akıllı Nesneler: kullanim-kilavuzu/cizim-araclari.md
    - Mimari Plan: kullanim-kilavuzu/duvarlar.md
    - Tesisat Tasarımı: kullanim-kilavuzu/tesisat.md
    - Boru Çapı Tasarımı: kullanim-kilavuzu/kapi-pencere.md
    - Otomatik Kontrol: kullanim-kilavuzu/odalar.md
    - 3D Katı Model: kullanim-kilavuzu/3d-gorunum.md
    - Dışa Aktarma ve E-İmza: kullanim-kilavuzu/disari-aktarma.md
    - DIPOS Dijital Onay: kullanim-kilavuzu/ai-ozellikleri.md